<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPS AI Coach</title>

<style>
body{
  font-family:sans-serif;
  background:#f1f5f9;
  margin:0;
}

header{
  background:#1d4ed8;
  color:white;
  text-align:center;
  padding:25px;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

h2{ color:#1d4ed8; }

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #cbd5e1;
}

button{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:#1d4ed8;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.result{
  margin-top:20px;
  padding:20px;
  background:#e0f2fe;
  border-radius:10px;
  display:none;
}

.box{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🏫 PAPS AI Fitness Coach</h1>
<p>정확한 PAPS 기준 분석 + 학교 맞춤 운동 추천</p>
</header>

<div class="container">

<h2>📋 PAPS 기록 입력</h2>

<label>윗몸말아올리기 (회)</label>
<input id="situp">

<label>왕복오래달리기 (횟수)</label>
<input id="run">

<label>앉아윗몸앞으로굽히기 (cm)</label>
<input id="flex">

<label>스마트폰 사용 시간 (시간)</label>
<input id="phone">

<button onclick="analyze()">분석하기</button>

<div class="result" id="result">

<div class="box">
<h3>📊 종합 상태</h3>
<p id="status"></p>
</div>

<div class="box">
<h3>⚠ 부족 분석</h3>
<p id="weak"></p>
</div>

<div class="box">
<h3>🏃 학교 운동 처방</h3>
<p id="exercise"></p>
</div>

<div class="box">
<h3>📱 스마트폰 기반 미션</h3>
<p id="phoneTask"></p>
</div>

<div class="box">
<h3>📅 7일 개선 프로그램</h3>
<p id="plan"></p>
</div>

<div class="box">
<h3>📈 변화 예측</h3>
<p id="change"></p>
</div>

</div>

</div>

<script>

function analyze(){

let situp = Number(document.getElementById("situp").value);
let run = Number(document.getElementById("run").value);
let flex = Number(document.getElementById("flex").value);
let phone = Number(document.getElementById("phone").value);

let status="";
let weak="";
let exercise="";
let phoneTask="";
let plan="";
let change="";

/* 근력 */
if(situp < 30){
status += "근력 부족 / ";
weak += "코어 약함 → 자세 불안정 가능<br>";
exercise += "플랭크 30초×3, 스쿼트 15회×3, 의자 스쿼트 10분<br>";
}else{
status += "근력 양호 / ";
}

/* 심폐 (왕복오래달리기) */
if(run < 30){
status += "심폐 부족 / ";
weak += "지구력 부족 → 쉽게 피로<br>";
exercise += "운동장 200m 걷기 + 200m 뛰기 5세트 (20분)<br>";
}else{
status += "심폐 양호 / ";
}

/* 유연성 */
if(flex < 10){
status += "유연성 부족";
weak += "근육 경직 → 허리 부담 증가<br>";
exercise += "햄스트링 20초×5, 허리 스트레칭 10분<br>";
}

/* 스마트폰 */
phoneTask =
`스마트폰 ${phone}시간 기반 미션<br>
- 스쿼트 ${phone*15}회<br>
- 플랭크 ${phone*30}초<br>
- 걷기 ${phone*10}분<br>
- 계단 5층 3회`;

/* 7일 계획 */
plan =
`DAY1 걷기 + 스트레칭<br>
DAY2 계단 운동<br>
DAY3 인터벌 달리기<br>
DAY4 회복 스트레칭<br>
DAY5 근력 운동<br>
DAY6 1km 걷기/달리기<br>
DAY7 기록 측정`;

/* 변화 */
change =
`1주: 체력 회복 시작<br>
2주: 왕복달리기 기록 증가<br>
3주: 자세 안정 + 지구력 상승`;

document.getElementById("status").innerHTML=status;
document.getElementById("weak").innerHTML=weak;
document.getElementById("exercise").innerHTML=exercise;
document.getElementById("phoneTask").innerHTML=phoneTask;
document.getElementById("plan").innerHTML=plan;
document.getElementById("change").innerHTML=change;

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPS AI Coach 3.0</title>

<style>
body{
  font-family:sans-serif;
  background:#f1f5f9;
  margin:0;
}

header{
  background:#1d4ed8;
  color:white;
  text-align:center;
  padding:25px;
}

.container{
  max-width:900px;
  margin:20px auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

h2{ color:#1d4ed8; }

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #cbd5e1;
}

button{
  width:100%;
  margin-top:20px;
  padding:15px;
  background:#1d4ed8;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.result{
  margin-top:20px;
  padding:20px;
  background:#e0f2fe;
  border-radius:10px;
  display:none;
}

.box{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🏫 PAPS AI Coach 3.0</h1>
<p>성별 + 나이 + PAPS 등급 분석 시스템</p>
</header>

<div class="container">

<h2>📋 학생 정보 입력</h2>

<label>성별</label>
<select id="gender">
  <option value="male">남</option>
  <option value="female">여</option>
</select>

<label>나이</label>
<input id="age" type="number" placeholder="예: 15">

<label>윗몸말아올리기 (회)</label>
<input id="situp">

<label>왕복오래달리기 (횟수)</label>
<input id="run">

<label>앉아윗몸앞으로굽히기 (cm)</label>
<input id="flex">

<label>스마트폰 사용 시간 (시간)</label>
<input id="phone">

<button onclick="analyze()">PAPS 분석</button>

<div class="result" id="result">

<div class="box">
<h3>📊 종합 평가</h3>
<p id="status"></p>
</div>

<div class="box">
<h3>🏆 PAPS 등급</h3>
<p id="grade"></p>
</div>

<div class="box">
<h3>⚠ 부족 분석</h3>
<p id="weak"></p>
</div>

<div class="box">
<h3>🏃 운동 처방</h3>
<p id="exercise"></p>
</div>

<div class="box">
<h3>📱 스마트폰 미션</h3>
<p id="phoneTask"></p>
</div>

</div>

</div>

<script>

function analyze(){

let gender = document.getElementById("gender").value;
let age = Number(document.getElementById("age").value);

let situp = Number(document.getElementById("situp").value);
let run = Number(document.getElementById("run").value);
let flex = Number(document.getElementById("flex").value);
let phone = Number(document.getElementById("phone").value);

let score = 0;
let status="";
let weak="";
let exercise="";
let grade="";

/* 기본 점수 계산 */
if(situp >= 40) score += 2;
else if(situp >= 25) score += 1;

if(run >= 50) score += 2;
else if(run >= 30) score += 1;

if(flex >= 15) score += 2;
else if(flex >= 5) score += 1;

/* 상태 */
if(score >= 5) status = "전체 체력 우수";
else if(score >= 3) status = "보통 수준";
else status = "체력 개선 필요";

/* 등급 */
if(score >= 6) grade = "1등급 (매우 우수)";
else if(score == 5) grade = "2등급 (우수)";
else if(score == 4) grade = "3등급 (보통)";
else if(score == 3) grade = "4등급 (미흡)";
else grade = "5등급 (개선 필요)";

/* 부족 분석 */
if(situp < 25)
weak += "근력 부족 → 코어 운동 필요<br>";

if(run < 30)
weak += "심폐지구력 부족 → 달리기 훈련 필요<br>";

if(flex < 5)
weak += "유연성 부족 → 스트레칭 필요<br>";

/* 운동 처방 */
exercise =
"🏫 학교 운동 추천<br>" +
"- 운동장 인터벌 20분<br>" +
"- 계단 오르기 10분<br>" +
"- 플랭크 30초×3<br>" +
"- 스트레칭 10분";

/* 스마트폰 미션 */
let phoneTask =
`📱 스마트폰 ${phone}시간 기준<br>
- 스쿼트 ${phone*15}회<br>
- 플랭크 ${phone*30}초<br>
- 걷기 ${phone*10}분`;

/* 출력 */
document.getElementById("status").innerHTML = status;
document.getElementById("grade").innerHTML = grade;
document.getElementById("weak").innerHTML = weak;
document.getElementById("exercise").innerHTML = exercise;
document.getElementById("phoneTask").innerHTML = phoneTask;

document.getElementById("result").style.display = "block";

}

</script>

</body>
</html>

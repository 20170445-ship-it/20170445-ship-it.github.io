<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI School Health Coach</title>

  <style>

    body{
      font-family: sans-serif;
      background:#eef6ff;
      margin:0;
      padding:0;
      color:#1e293b;
    }

    header{
      background:#2563eb;
      color:white;
      text-align:center;
      padding:30px;
    }

    header h1{
      margin:0;
      font-size:40px;
    }

    .container{
      width:90%;
      max-width:1000px;
      margin:30px auto;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h2{
      color:#2563eb;
    }

    label{
      display:block;
      margin-top:18px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      margin-top:5px;
    }

    button{
      width:100%;
      margin-top:30px;
      padding:16px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#1d4ed8;
    }

    .result{
      margin-top:30px;
      padding:25px;
      background:#dbeafe;
      border-radius:15px;
      display:none;
    }

    .section{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-top:20px;
    }

    .danger{
      color:#dc2626;
      font-weight:bold;
    }

    .good{
      color:#16a34a;
      font-weight:bold;
    }

    ul{
      line-height:1.8;
    }

  </style>

</head>

<body>

<header>
  <h1>🏃 AI School Health Coach</h1>
  <p>PAPS 기록 + 생활 습관 분석 기반 학교 맞춤 운동 추천 시스템</p>
</header>

<div class="container">

  <h2>📋 실제 PAPS 기록 입력</h2>

  <label>윗몸말아올리기 (1분 동안 몇 회?)</label>
  <input type="number" id="situp" placeholder="예: 25">

  <label>오래달리기 (몇 분 걸렸나요?)</label>
  <input type="number" id="run" placeholder="예: 10">

  <label>앉아윗몸앞으로굽히기 (cm)</label>
  <input type="number" id="flex" placeholder="예: 5">

  <label>하루 스마트폰 사용 시간 (시간)</label>
  <input type="number" id="phone" placeholder="예: 5">

  <button onclick="analyzeHealth()">AI 건강 분석 받기</button>

  <div class="result" id="resultBox">

    <h2>🤖 AI 분석 결과</h2>

    <div class="section">
      <h3>📊 현재 건강 상태</h3>
      <p id="healthResult"></p>
    </div>

    <div class="section">
      <h3>⚠ 부족한 부분 & 개선 설명</h3>
      <p id="weakness"></p>
    </div>

    <div class="section">
      <h3>🏫 학교 맞춤 운동 추천</h3>
      <p id="exercise"></p>
    </div>

    <div class="section">
      <h3>📱 스마트폰 사용 기반 챌린지</h3>
      <p id="phoneChallenge"></p>
    </div>

    <div class="section">
      <h3>📅 7일 운동 계획</h3>
      <p id="plan"></p>
    </div>

    <div class="section">
      <h3>📈 예상 변화 분석</h3>
      <p id="change"></p>
    </div>

  </div>

</div>

<script>

function analyzeHealth(){

  const situp = parseInt(document.getElementById("situp").value);
  const run = parseInt(document.getElementById("run").value);
  const flex = parseInt(document.getElementById("flex").value);
  const phone = parseInt(document.getElementById("phone").value);

  let health = "";
  let weak = "";
  let exercise = "";
  let challenge = "";
  let plan = "";
  let change = "";

  // 근력 분석
  if(situp < 30){

    health += "💪 근력이 부족한 상태입니다.<br>";

    weak += `
    복부와 코어 근육의 힘이 부족하여 오래 앉아있을 때 자세가 무너질 가능성이 있습니다.<br>
    또한 허리 피로와 체력 저하가 빨리 나타날 수 있습니다.<br><br>
    `;

    exercise += `
    ✅ 추천 운동<br>
    - 점심시간 이후 운동장 걷기 15분<br>
    - 플랭크 30초 × 3세트<br>
    - 교실 의자 스쿼트 15회 × 3세트<br>
    - 학교 계단 3층~1층 왕복 5회<br><br>
    `;

  } else {

    health += "💪 근력이 좋은 상태입니다.<br>";

  }

  // 심폐지구력 분석
  if(run > 8){

    health += "🫀 심폐지구력이 부족합니다.<br>";

    weak += `
    오래달리기 기록이 느린 편으로 쉽게 숨이 차거나 오래 움직이기 힘들 가능성이 있습니다.<br>
    체육 활동 중 지구력 저하가 발생할 수 있습니다.<br><br>
    `;

    exercise += `
    ✅ 심폐지구력 향상 운동<br>
    - 운동장 400m 걷기 → 200m 뛰기 반복 20분<br>
    - 학교 운동장 바깥 라인 따라 천천히 조깅 1km<br>
    - 계단 빠르게 오르기 10분<br><br>
    `;

  } else {

    health += "🫀 심폐지구력이 좋은 상태입니다.<br>";

  }

  // 유연성 분석
  if(flex < 10){

    health += "🤸 유연성이 부족합니다.<br>";

    weak += `
    허벅지와 허리 근육이 뻣뻣할 가능성이 높습니다.<br>
    오래 앉아 공부할 경우 허리 통증 위험이 증가할 수 있습니다.<br><br>
    `;

    exercise += `
    ✅ 유연성 향상 운동<br>
    - 쉬는시간 목 스트레칭 3분<br>
    - 햄스트링 스트레칭 20초 × 5세트<br>
    - 체육관 벽 밀기 스트레칭 10분<br>
    - 수업 전후 허리 돌리기 운동<br><br>
    `;

  } else {

    health += "🤸 유연성이 좋은 상태입니다.<br>";

  }

  // 스마트폰 챌린지

  challenge = `
  오늘 스마트폰 사용 시간은 ${phone}시간입니다.<br><br>

  📱 AI 챌린지 추천<br>
  - 스쿼트 ${phone * 15}회<br>
  - 플랭크 ${phone * 30}초<br>
  - 학교 운동장 걷기 ${phone * 10}분<br>
  - 엘리베이터 대신 계단 이용하기<br>
  - 자기 전 스트레칭 ${phone * 5}분 수행<br><br>

  스마트폰 사용 시간이 길수록 목 건강과 자세가 나빠질 가능성이 있으므로
  자세 교정 운동이 꼭 필요합니다.
  `;

  // 7일 계획

  plan = `
  📅 DAY 1<br>
  운동장 1km 걷기 + 플랭크 3세트<br><br>

  📅 DAY 2<br>
  계단 오르기 15분 + 스트레칭 10분<br><br>

  📅 DAY 3<br>
  운동장 인터벌 달리기 20분<br><br>

  📅 DAY 4<br>
  쉬는시간 스트레칭 집중 실시<br><br>

  📅 DAY 5<br>
  스쿼트 20회 × 3세트 + 조깅 15분<br><br>

  📅 DAY 6<br>
  학교 운동장 2km 걷기 챌린지<br><br>

  📅 DAY 7<br>
  전체 기록 측정 및 변화 확인
  `;

  // 변화 예상

  change = `
  📈 예상 변화<br><br>

  ✔ 1주 후<br>
  - 오래달리기 기록 개선 가능<br>
  - 자세 안정성 증가<br>
  - 허리 피로 감소<br><br>

  ✔ 2~3주 후<br>
  - 계단 오르기 시 숨참 감소<br>
  - 플랭크 유지 시간 증가<br>
  - 유연성 증가 가능<br><br>

  ✔ 꾸준히 수행할 경우<br>
  - 체육 활동 능력 향상<br>
  - 집중력 증가<br>
  - 스마트폰 의존 감소 효과 기대
  `;

  document.getElementById("healthResult").innerHTML = health;
  document.getElementById("weakness").innerHTML = weak;
  document.getElementById("exercise").innerHTML = exercise;
  document.getElementById("phoneChallenge").innerHTML = challenge;
  document.getElementById("plan").innerHTML = plan;
  document.getElementById("change").innerHTML = change;

  document.getElementById("resultBox").style.display = "block";

}

</script>

</body>
</html>
